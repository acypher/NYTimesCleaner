<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>NewsMinus</title>
    <style>
      body {
        box-sizing: border-box;
        width: 260px;
        margin: 0;
        padding: 14px;
        color: #111;
        font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        line-height: 1.2;
      }

      .slogan {
        margin: 0 0 12px;
        color: #555;
        font-size: 12px;
        line-height: 1.35;
      }

      label {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        margin: 12px 0;
      }

      input {
        margin-top: 2px;
      }

      .title {
        display: block;
        font-weight: 600;
      }

      .hint {
        display: block;
        margin-top: 2px;
        color: #555;
        font-size: 12px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <h1>NewsMinus</h1>
    <p class="slogan">News without video autoplay and self-ads</p>

    <label>
      <input id="noAutoplay" type="checkbox">
      <span>
        <span class="title">No autoplay</span>
        <span class="hint">Stop NYTimes videos and carousels from starting on their own.</span>
      </span>
    </label>

    <label>
      <input id="noTimesAds" type="checkbox">
      <span>
        <span class="title">NoTimesAds</span>
        <span class="hint">Hide NYTimes onsite subscription upgrade messages.</span>
      </span>
    </label>

    <script src="popup.js"></script>
  </body>
</html>
